<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&amp;family=Manrope:wght@600;700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#000000"/>

  <!-- Ray burst behind text -->
  <g transform="translate(340, 240)">
    <!-- Dark rays -->
    <line x1="0" y1="0" x2="0" y2="-130" stroke="#333333" stroke-width="6" stroke-linecap="round" transform="rotate(-75)"/>
    <line x1="0" y1="0" x2="0" y2="-115" stroke="#2A2A2A" stroke-width="5" stroke-linecap="round" transform="rotate(-60)"/>
    <line x1="0" y1="0" x2="0" y2="-100" stroke="#333333" stroke-width="4" stroke-linecap="round" transform="rotate(-45)"/>
    <line x1="0" y1="0" x2="0" y2="-90" stroke="#2A2A2A" stroke-width="5" stroke-linecap="round" transform="rotate(-30)"/>
    <line x1="0" y1="0" x2="0" y2="-120" stroke="#333333" stroke-width="4" stroke-linecap="round" transform="rotate(-15)"/>

    <!-- Red ray (left) -->
    <line x1="0" y1="0" x2="0" y2="-140" stroke="#C8242A" stroke-width="8" stroke-linecap="round" transform="rotate(-50)"/>
    <line x1="0" y1="0" x2="0" y2="-100" stroke="#C8242A" stroke-width="5" stroke-linecap="round" transform="rotate(160)"/>

    <!-- Yellow ray (center) -->
    <line x1="0" y1="0" x2="0" y2="-145" stroke="#F0C029" stroke-width="8" stroke-linecap="round" transform="rotate(-5)"/>
    <line x1="0" y1="0" x2="0" y2="-110" stroke="#F0C029" stroke-width="5" stroke-linecap="round" transform="rotate(175)"/>

    <!-- Blue ray (right) -->
    <line x1="0" y1="0" x2="0" y2="-135" stroke="#1A4BA8" stroke-width="8" stroke-linecap="round" transform="rotate(30)"/>
    <line x1="0" y1="0" x2="0" y2="-95" stroke="#1A4BA8" stroke-width="5" stroke-linecap="round" transform="rotate(210)"/>

    <!-- More dark rays -->
    <line x1="0" y1="0" x2="0" y2="-110" stroke="#333333" stroke-width="4" stroke-linecap="round" transform="rotate(15)"/>
    <line x1="0" y1="0" x2="0" y2="-95" stroke="#2A2A2A" stroke-width="5" stroke-linecap="round" transform="rotate(50)"/>
    <line x1="0" y1="0" x2="0" y2="-120" stroke="#333333" stroke-width="4" stroke-linecap="round" transform="rotate(65)"/>
    <line x1="0" y1="0" x2="0" y2="-105" stroke="#2A2A2A" stroke-width="5" stroke-linecap="round" transform="rotate(80)"/>

    <!-- Bottom dark rays -->
    <line x1="0" y1="0" x2="0" y2="-100" stroke="#333333" stroke-width="4" stroke-linecap="round" transform="rotate(120)"/>
    <line x1="0" y1="0" x2="0" y2="-90" stroke="#2A2A2A" stroke-width="5" stroke-linecap="round" transform="rotate(135)"/>
    <line x1="0" y1="0" x2="0" y2="-110" stroke="#333333" stroke-width="4" stroke-linecap="round" transform="rotate(145)"/>
    <line x1="0" y1="0" x2="0" y2="-85" stroke="#2A2A2A" stroke-width="4" stroke-linecap="round" transform="rotate(195)"/>
    <line x1="0" y1="0" x2="0" y2="-95" stroke="#333333" stroke-width="5" stroke-linecap="round" transform="rotate(225)"/>
    <line x1="0" y1="0" x2="0" y2="-100" stroke="#2A2A2A" stroke-width="4" stroke-linecap="round" transform="rotate(250)"/>
  </g>

  <!-- CZR. wordmark -->
  <text x="340" y="265" font-family="'Syne', sans-serif" font-weight="800" font-size="120" fill="#FFFFFF" letter-spacing="-6" text-anchor="middle">CZR.</text>

  <!-- Tagline -->
  <text x="250" y="310" font-family="'Manrope', sans-serif" font-weight="600" font-size="14" fill="#999999" letter-spacing="3" text-anchor="start">HAUTE COUTURE DIGITAL · DELIVERED IN 48H</text>

  <!-- Domain -->
  <text x="640" y="430" font-family="'Manrope', sans-serif" font-weight="600" font-size="16" fill="#666666" letter-spacing="1">czr.studio</text>
</svg>
