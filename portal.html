<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Project — CZR Studio</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000000;
      --surface: #080808;
      --surface-2: #0F0F0F;
      --surface-3: #181818;
      --border: rgba(255,255,255,0.07);
      --border-hard: rgba(255,255,255,0.10);
      --border-bright: rgba(255,255,255,0.18);
      --text: #FFFFFF;
      --text-muted: #999999;
      --text-dim: #555555;
      --m-red: #C8242A;
      --m-yellow: #F0C029;
      --m-blue: #1A4BA8;
      --m-green: #22C55E;
      --font-display: 'Syne', sans-serif;
      --font-body: 'Manrope', sans-serif;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --phase-onboarding: #6e6e6e;
      --phase-briefing: var(--m-yellow);
      --phase-in_progress: var(--m-blue);
      --phase-review: #A855F7;
      --phase-revision: var(--m-red);
      --phase-delivered: var(--m-green);
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── Loading ──────────────────────────── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; color: var(--text-dim); flex-direction: column; gap: 16px;
    }
    .spinner {
      width: 28px; height: 28px; border: 2px solid var(--border-hard);
      border-top-color: var(--text); border-radius: 0;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading span { font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-dim); }

    /* ── Error ────────────────────────────── */
    .error-page {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; flex-direction: column; gap: 20px; text-align: center;
    }
    .error-page h2 {
      font-family: var(--font-display); font-weight: 800; font-size: 28px;
      letter-spacing: -0.04em;
    }
    .error-page p { color: var(--text-muted); max-width: 340px; font-size: 14px; }

    /* ── Header ───────────────────────────── */
    header {
      border-bottom: 1px solid var(--border-hard);
      padding: 20px 32px;
      display: flex; justify-content: space-between; align-items: center;
      background: var(--bg);
    }
    .wordmark {
      font-family: var(--font-display); font-weight: 800; font-size: 22px;
      color: var(--text); text-decoration: none; letter-spacing: -0.05em;
      position: relative;
    }
    .wordmark::after {
      content: ''; position: absolute; bottom: -2px; left: 0;
      width: 0; height: 2px; background: var(--m-red);
      transition: width 0.3s var(--ease);
    }
    .wordmark:hover::after { width: 100%; }
    .client-badge {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--text-dim);
    }

    /* ── Main ─────────────────────────────── */
    .main {
      max-width: 940px; margin: 0 auto; padding: 48px 24px;
      display: flex; flex-direction: column; gap: 28px;
    }

    /* ── Card ─────────────────────────────── */
    .card {
      background: var(--surface); border: 1px solid var(--border-hard);
      border-radius: 0; overflow: hidden;
    }
    .card-header {
      padding: 18px 24px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .card-title {
      font-family: var(--font-display); font-size: 0.78rem; font-weight: 700;
      letter-spacing: -0.02em; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-dim);
    }
    .card-body { padding: 24px; }

    /* ── Phase badge ──────────────────────── */
    .phase-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 5px 14px; border-radius: 0; font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: var(--surface-3); border: 1px solid;
    }
    .phase-dot { width: 7px; height: 7px; border-radius: 0; }

    /* ── Steps bar ────────────────────────── */
    .steps-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 0; padding: 28px 24px;
    }
    .step { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
    .step-dot {
      width: 12px; height: 12px; border-radius: 0;
      background: var(--surface-3); border: 2px solid var(--border-hard);
      position: relative; z-index: 1;
    }
    .step.done .step-dot { background: var(--text); border-color: var(--text); }
    .step.active .step-dot {
      background: transparent; border-color: var(--text);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.1);
    }
    .step-label {
      font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-dim); text-align: center; font-weight: 700;
    }
    .step.done .step-label, .step.active .step-label { color: var(--text); }
    .step-line { height: 1px; flex: 1; background: var(--border-hard); }
    .step-line.done { background: var(--text); }

    /* ── Summary grid ─────────────────────── */
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .summary-item { display: flex; flex-direction: column; gap: 4px; }
    .summary-label {
      font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.18em;
      color: var(--text-dim); font-weight: 700;
    }
    .summary-value { font-size: 15px; font-weight: 600; }
    .site-link { color: var(--text); text-decoration: none; border-bottom: 1px solid var(--m-red); }
    .site-link:hover { border-bottom-color: var(--text); }

    /* ── Timeline ─────────────────────────── */
    .timeline { display: flex; flex-direction: column; gap: 0; }
    .timeline-item {
      display: flex; gap: 16px; padding: 16px 0;
      border-bottom: 1px solid var(--border); position: relative;
    }
    .timeline-item:last-child { border-bottom: none; }
    .timeline-dot-col { display: flex; flex-direction: column; align-items: center; min-width: 20px; }
    .timeline-dot {
      width: 10px; height: 10px; border-radius: 0;
      background: var(--text); flex-shrink: 0; margin-top: 5px;
    }
    .timeline-content { flex: 1; }
    .timeline-type {
      font-size: 0.65rem; font-weight: 700; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .timeline-desc { font-size: 14px; color: var(--text-muted); margin-top: 3px; }
    .timeline-time { font-size: 0.65rem; color: var(--text-dim); margin-top: 6px; }

    /* ── Messages ──────────────────────────── */
    .messages { display: flex; flex-direction: column; gap: 14px; max-height: 440px; overflow-y: auto; }
    .message { display: flex; gap: 10px; }
    .message.user { flex-direction: row-reverse; }
    .msg-bubble {
      max-width: 72%; padding: 12px 16px; border-radius: 0;
      font-size: 14px; line-height: 1.6;
    }
    .user .msg-bubble {
      background: var(--text); color: var(--bg);
      font-weight: 500;
    }
    .model .msg-bubble {
      background: var(--surface-3); border: 1px solid var(--border-hard);
    }
    .msg-time { font-size: 0.6rem; color: var(--text-dim); margin-top: 4px; }
    .user .msg-time { text-align: right; }

    /* ── Revisions ─────────────────────────── */
    .revisions { display: flex; flex-direction: column; gap: 12px; }
    .revision-item {
      padding: 16px 18px; border-radius: 0;
      background: var(--surface-2); border: 1px solid var(--border-hard);
    }
    .revision-status {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; margin-bottom: 6px;
    }
    .revision-status.resolved { color: var(--m-green); }
    .revision-status.pending { color: var(--m-yellow); }
    .revision-text { font-size: 14px; color: var(--text-muted); }
    .revision-date { font-size: 0.6rem; color: var(--text-dim); margin-top: 6px; }

    /* ── Empty state ───────────────────────── */
    .empty { color: var(--text-dim); font-size: 14px; padding: 12px 0; }

    /* ── Scrollbar ─────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-hard); border-radius: 0; }

    @media (max-width: 640px) {
      header { padding: 16px 20px; }
      .main { padding: 32px 16px; }
      .summary-grid { grid-template-columns: 1fr; }
      .steps-bar { padding: 20px 12px; }
      .step-label { font-size: 0.5rem; }
    }
  </style>

</head>
<body>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <span>Loading your project</span>
  </div>
  <div id="error-page" class="error-page" style="display:none">
    <h2>Invalid Link</h2>
    <p>This portal link is invalid or has expired. Please contact CZR Studio.</p>
  </div>
  <div id="app" style="display:none">
    <header>
      <a href="/" class="wordmark">CZR.</a>
      <div class="client-badge" id="header-name"></div>
    </header>
    <main class="main">
      <!-- Status card -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Project Status</span>
          <span id="phase-badge" class="phase-badge">
            <span id="phase-dot" class="phase-dot"></span>
            <span id="phase-label"></span>
          </span>
        </div>
        <!-- Progress steps -->
        <div class="steps-bar" id="steps-bar"></div>
        <!-- Summary -->
        <div class="card-body">
          <div class="summary-grid">
            <div class="summary-item">
              <span class="summary-label">Package</span>
              <span class="summary-value" id="pkg-label">—</span>
            </div>
            <div class="summary-item">
              <span class="summary-label">Estimated Delivery</span>
              <span class="summary-value" id="delivery-label">—</span>
            </div>
            <div class="summary-item" id="site-row" style="display:none">
              <span class="summary-label">Live Site</span>
              <span class="summary-value"><a id="site-link" class="site-link" href="" target="_blank">View your site →</a></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Timeline -->
      <div class="card">
        <div class="card-header"><span class="card-title">Timeline</span></div>
        <div class="card-body">
          <div class="timeline" id="timeline"></div>
        </div>
      </div>

      <!-- Conversation -->
      <div class="card">
        <div class="card-header"><span class="card-title">Conversation</span></div>
        <div class="card-body">
          <div class="messages" id="messages"></div>
        </div>
      </div>

      <!-- Revisions -->
      <div class="card" id="revisions-card">
        <div class="card-header"><span class="card-title">Revision Requests</span></div>
        <div class="card-body">
          <div class="revisions" id="revisions"></div>
        </div>
      </div>
    </main>
  </div>

<script>
const PHASES = ['onboarding', 'briefing', 'in_progress', 'review', 'revision', 'delivered'];
const PHASE_LABELS = {
  onboarding: 'Introduction',
  briefing: 'Brief Confirmed',
  in_progress: 'In Production',
  review: 'Under Review',
  revision: 'Revisions',
  delivered: 'Delivered',
};
const PHASE_COLORS = {
  onboarding: '#6e6e6e', briefing: '#F0C029', in_progress: '#1A4BA8',
  review: '#A855F7', revision: '#C8242A', delivered: '#22C55E',
};
const EVENT_LABELS = {
  project_created: '🟢 Project started',
  phase_changed: '🔄 Status update',
  payment_confirmed: '💳 Payment confirmed',
  payment_created: '💳 Checkout created',
  revision_submitted: '📝 Revision requested',
  asset_added: '📎 Asset received',
  testimonial_received: '⭐ Testimonial received',
};

function getPortalToken() {
  return new URLSearchParams(window.location.search).get('token') || '';
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
}

function renderPhase(phase) {
  const color = PHASE_COLORS[phase] || '#6e6e6e';
  document.getElementById('phase-dot').style.background = color;
  document.getElementById('phase-badge').style.borderColor = color + '44';
  document.getElementById('phase-label').textContent = PHASE_LABELS[phase] || phase;

  const stepsBar = document.getElementById('steps-bar');
  const relevant = ['onboarding', 'briefing', 'in_progress', 'review', 'delivered'];
  const idx = relevant.indexOf(phase === 'revision' ? 'in_progress' : phase);
  stepsBar.innerHTML = '';
  relevant.forEach((p, i) => {
    if (i > 0) {
      const line = document.createElement('div');
      line.className = 'step-line' + (i <= idx ? ' done' : '');
      stepsBar.appendChild(line);
    }
    const step = document.createElement('div');
    step.className = 'step' + (i < idx ? ' done' : i === idx ? ' active' : '');
    step.innerHTML = `<div class="step-dot"></div><div class="step-label">${PHASE_LABELS[p]}</div>`;
    stepsBar.appendChild(step);
  });
}

function renderTimeline(events) {
  const el = document.getElementById('timeline');
  if (!events || !events.length) {
    el.innerHTML = '<div class="empty">No events yet.</div>';
    return;
  }
  el.innerHTML = events.slice().reverse().map(ev => `
    <div class="timeline-item">
      <div class="timeline-dot-col"><div class="timeline-dot"></div></div>
      <div class="timeline-content">
        <div class="timeline-type">${EVENT_LABELS[ev.event_type] || ev.event_type}</div>
        ${ev.description ? `<div class="timeline-desc">${ev.description}</div>` : ''}
        <div class="timeline-time">${formatDate(ev.created_at)}</div>
      </div>
    </div>
  `).join('');
}

function renderMessages(messages) {
  const el = document.getElementById('messages');
  if (!messages || !messages.length) {
    el.innerHTML = '<div class="empty">No messages yet.</div>';
    return;
  }
  el.innerHTML = messages.map(m => {
    const isUser = m.role === 'user' || m.role === 'client';
    return `
      <div class="message ${isUser ? 'user' : 'model'}">
        <div>
          <div class="msg-bubble">${m.content.replace(/\n/g, '<br>')}</div>
          <div class="msg-time">${formatDate(m.created_at)}</div>
        </div>
      </div>
    `;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function renderRevisions(revisions) {
  const el = document.getElementById('revisions');
  const card = document.getElementById('revisions-card');
  if (!revisions || !revisions.length) {
    card.style.display = 'none';
    return;
  }
  el.innerHTML = revisions.map(r => `
    <div class="revision-item">
      <div class="revision-status ${r.resolved ? 'resolved' : 'pending'}">
        ${r.resolved ? '✓ Resolved' : '· Pending'}
      </div>
      <div class="revision-text">${r.message}</div>
      <div class="revision-date">${formatDate(r.submitted_at)}</div>
    </div>
  `).join('');
}

async function load() {
  const token = getPortalToken();
  if (!token) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-page').style.display = 'flex';
    return;
  }

  const apiBase = window.location.port === '9999'
    ? `${window.location.protocol}//${window.location.hostname}:9999`
    : '';

  try {
    const resp = await fetch(`${apiBase}/api/portal/${token}`);
    if (!resp.ok) throw new Error('Not found');
    const data = await resp.json();

    const { project, messages, revisions, events } = data;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.title = `${project.client_name || 'Your Project'} — CZR Studio`;
    document.getElementById('header-name').textContent = project.client_name || '';

    document.getElementById('pkg-label').textContent = project.package || '—';
    document.getElementById('delivery-label').textContent = project.estimated_delivery || 'To be confirmed';

    if (project.site_url) {
      const row = document.getElementById('site-row');
      row.style.display = 'flex';
      document.getElementById('site-link').href = project.site_url;
    }

    renderPhase(project.phase);
    renderTimeline(events);
    renderMessages(messages);
    renderRevisions(revisions);

  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-page').style.display = 'flex';
  }
}

load();
</script>
</body>
</html>
